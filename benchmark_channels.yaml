# Re-run: python -m channel_analyzer.benchmark_program

reference_channel: whisprs_yt

# Pipeline overrides for benchmark runs (faster than full reference analysis)
benchmark_pipeline:
  top_n_download: 15
  top_n_report: 10
  max_videos_discover: 80
  whisper_model: tiny

