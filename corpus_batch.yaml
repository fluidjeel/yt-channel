# Split batch: Phase A download (cookies) → Phase B analyze (offline).
# Option A lite + size caps to avoid 7 GB outliers.
pipeline:
  top_n_download: 5
  top_n_report: 5
  max_videos_discover: 20
  max_video_duration_seconds: 180
  max_download_mb: 500
  max_batch_gb: 25
  whisper_model: tiny
  run_advanced_visual: false
  run_comment_intelligence: false
  run_bible_synthesis: false
  purge_artifacts_after_channel: false
phase: split_batch
